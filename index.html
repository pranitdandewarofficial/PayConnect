<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayConnect - P2P Payment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .role-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .role-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse-ring {
            position: relative;
        }
        
        .pulse-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid #667eea;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo Section -->
        <div class="text-center mb-8 animate-fade-in">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-lg mb-4 pulse-ring">
                <i class="fas fa-wallet text-3xl text-purple-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">PayConnect</h1>
            <p class="text-white/80 text-sm">Secure P2P Payment System</p>
        </div>
        
        <!-- Role Selection -->
        <div class="glass-card rounded-3xl p-6 shadow-2xl animate-fade-in">
            <h2 class="text-xl font-semibold text-gray-800 mb-6 text-center">Choose Your Role</h2>
            
            <div class="space-y-4">
                <!-- Payer Option -->
                <div onclick="selectRole('payer')" class="role-card bg-gradient-to-r from-blue-50 to-blue-100 border-2 border-blue-200 rounded-2xl p-5 flex items-center space-x-4">
                    <div class="w-14 h-14 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg">
                        <i class="fas fa-paper-plane text-white text-xl"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-semibold text-gray-800 text-lg">Send Money</h3>
                        <p class="text-gray-500 text-sm">Pay to any UPI ID</p>
                    </div>
                    <i class="fas fa-chevron-right text-blue-400"></i>
                </div>
                
                <!-- Receiver Option -->
                <div onclick="selectRole('receiver')" class="role-card bg-gradient-to-r from-green-50 to-green-100 border-2 border-green-200 rounded-2xl p-5 flex items-center space-x-4">
                    <div class="w-14 h-14 bg-green-500 rounded-xl flex items-center justify-center shadow-lg">
                        <i class="fas fa-hand-holding-usd text-white text-xl"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-semibold text-gray-800 text-lg">Receive Money</h3>
                        <p class="text-gray-500 text-sm">Link UPI & get orders</p>
                    </div>
                    <i class="fas fa-chevron-right text-green-400"></i>
                </div>
            </div>
            
            <div class="mt-6 text-center">
                <p class="text-xs text-gray-400">Secure • Fast • Verified</p>
            </div>
        </div>
        
        <!-- Bottom Info -->
        <div class="mt-6 text-center text-white/60 text-xs">
            <p>By continuing, you agree to our Terms & Privacy Policy</p>
        </div>
    </div>
    
    <script>
        function selectRole(role) {
            // Add loading effect
            document.body.style.cursor = 'wait';
            
            setTimeout(() => {
                if (role === 'payer') {
                    window.location.href = 'pages/payer.html';
                } else {
                    window.location.href = 'pages/receiver.html';
                }
            }, 300);
        }
        
        // Check if user already has a role
        document.addEventListener('DOMContentLoaded', () => {
            const userRole = localStorage.getItem('userRole');
            const userData = localStorage.getItem('userData');
            
            if (userRole && userData) {
                const user = JSON.parse(userData);
                if (userRole === 'payer') {
                    window.location.href = 'pages/payer-dashboard.html';
                } else {
                    window.location.href = 'pages/receiver-dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
